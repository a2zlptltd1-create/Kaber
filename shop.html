<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>April Apparel - Shop</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="privacy.html">Privacy</a></li>
        <li><a href="returns.html">Returns</a></li>
        <li>Cart: <span id="cart-count">0</span></li>
      </ul>
    </nav>
  </header>

  <section class="page-content">
    <h1>Shop Our Collection</h1>
    <div class="shop-grid">
      <div class="product-card">
        <img src="cap.svg" alt="Cap">
        <h3>Cap</h3>
        <p>$29</p>
        <button class="add-to-cart" data-product="Cap">Add to Cart</button>
      </div>
      <div class="product-card">
        <img src="tshirt.svg" alt="T-Shirt">
        <h3>T-Shirt</h3>
        <p>$49</p>
        <button class="add-to-cart" data-product="T-Shirt">Add to Cart</button>
      </div>
      <div class="product-card">
        <img src="pant.svg" alt="Pant">
        <h3>Pant</h3>
        <p>$69</p>
        <button class="add-to-cart" data-product="Pant">Add to Cart</button>
      </div>
      <div class="product-card">
        <img src="hoodie.svg" alt="Hoodie">
        <h3>Hoodie</h3>
        <p>$79</p>
        <button class="add-to-cart" data-product="Hoodie">Add to Cart</button>
      </div>
      <div class="product-card">
        <img src="tracksuit.svg" alt="Track Suit">
        <h3>Track Suit</h3>
        <p>$89</p>
        <button class="add-to-cart" data-product="Track Suit">Add to Cart</button>
      </div>
      <div class="product-card">
        <img src="jacket.svg" alt="Jacket">
        <h3>Jacket</h3>
        <p>$99</p>
        <button class="add-to-cart" data-product="Jacket">Add to Cart</button>
      </div>
    </div>
  </section>

  <footer>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="privacy.html">Privacy</a></li>
      <li><a href="returns.html">Returns</a></li>
    </ul>
    <div>Follow us: Facebook | Instagram | Twitter</div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
