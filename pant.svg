<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pantGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F3A52;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F1F2E;stop-opacity:1" />
    </linearGradient>
    <filter id="pantShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="#F5F5F5"/>
  <!-- Waistband -->
  <ellipse cx="100" cy="48" rx="38" ry="12" fill="#0F1F2E"/>
  <!-- Left Leg Back -->
  <path d="M70 60 L65 175 L75 180 L80 55 Z" fill="#0F1F2E" filter="url(#pantShadow)"/>
  <!-- Right Leg Back -->
  <path d="M120 55 L125 180 L135 175 L130 60 Z" fill="#0F1F2E" filter="url(#pantShadow)"/>
  <!-- Left Leg Front -->
  <path d="M75 60 L70 175 L80 180 L85 55 Z" fill="url(#pantGrad)"/>
  <!-- Right Leg Front -->
  <path d="M115 55 L120 180 L130 175 L125 60 Z" fill="url(#pantGrad)"/>
  <!-- Center Crease Left -->
  <line x1="77" y1="60" x2="72" y2="175" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>
  <!-- Center Crease Right -->
  <line x1="123" y1="60" x2="128" y2="175" stroke="#000000" stroke-width="0.5" opacity="0.15"/>
  <!-- Zipper Detail -->
  <rect x="96" y="48" width="3" height="20" fill="#B8860B" opacity="0.6"/>
  <!-- Fabric Texture Highlight -->
  <ellipse cx="75" cy="100" rx="8" ry="25" fill="#ffffff" opacity="0.08"/>
</svg>