<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C85A54;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8A3D38;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="#F5F5F5"/>
  <!-- Cap Crown Back -->
  <path d="M55 90 Q70 55 100 50 Q130 55 145 90 L140 100 Q110 105 100 108 Q90 105 60 100 Z" fill="url(#capGrad)" filter="url(#shadow)"/>
  <!-- Cap Crown Front -->
  <path d="M60 100 Q80 110 100 115 Q120 110 140 100 L145 90 Q130 55 100 50 Q70 55 55 90 Z" fill="#C85A54"/>
  <!-- Cap Visor -->
  <ellipse cx="100" cy="125" rx="65" ry="20" fill="#8A3D38"/>
  <ellipse cx="100" cy="120" rx="65" ry="18" fill="#C85A54"/>
  <!-- Bill Shadow -->
  <path d="M35 125 Q100 135 165 125 L165 130 Q100 140 35 130 Z" fill="#000000" opacity="0.1"/>
  <!-- Highlight -->
  <ellipse cx="75" cy="70" rx="12" ry="8" fill="#ffffff" opacity="0.25"/>
  <!-- Top Button -->
  <circle cx="100" cy="48" r="2.5" fill="#333333"/>
</svg>