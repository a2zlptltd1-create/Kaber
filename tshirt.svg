<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="teeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8DCC8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4C4AA;stop-opacity:1" />
    </linearGradient>
    <filter id="teeShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="#F5F5F5"/>
  <!-- Left Sleeve -->
  <path d="M50 60 L20 65 L15 95 L45 90 Z" fill="#E8DCC8" filter="url(#teeShadow)"/>
  <!-- Right Sleeve -->
  <path d="M150 60 L180 65 L185 95 L155 90 Z" fill="#E8DCC8" filter="url(#teeShadow)"/>
  <!-- Body Back -->
  <path d="M50 55 L150 55 L155 85 L165 100 L160 155 L40 155 L35 100 L45 85 Z" fill="url(#teeGrad)"/>
  <!-- Body Front (slightly raised) -->
  <path d="M48 57 L152 57 L157 80 L165 95 L160 150 L40 150 L35 95 L43 80 Z" fill="#E8DCC8"/>
  <!-- Neckline -->
  <ellipse cx="100" cy="55" rx="22" ry="12" fill="#D4C4AA"/>
  <!-- Seam Detail -->
  <line x1="100" y1="57" x2="100" y2="120" stroke="#C0B0A0" stroke-width="0.8" opacity="0.4"/>
  <!-- Highlight/Fabric Texture -->
  <ellipse cx="70" cy="85" rx="15" ry="20" fill="#ffffff" opacity="0.15"/>
  <ellipse cx="130" cy="95" rx="10" ry="18" fill="#ffffff" opacity="0.08"/>
</svg>